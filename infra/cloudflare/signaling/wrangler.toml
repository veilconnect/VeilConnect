# VeilConnect 信令 Worker（含房间 Durable Object + Cloudflare TURN 凭据签发）。
#
# 部署：
#   cd infra/cloudflare/signaling
#   wrangler deploy
#   # 设置 TURN 机密（Cloudflare 控制台 Realtime/Calls → TURN 拿 KEY_ID / API_TOKEN）：
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_API_TOKEN
#   # 绑定自定义域（控制台 Workers → 你的 worker → Triggers → Custom Domains）：signal.veilconnect.org
#
# 本地联调：wrangler dev --port 8787   （DO 在本地 workerd 中运行，可端到端测试）
name = "veilconnect-signaling"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# 自定义域：把信令 Worker 绑到 signal.veilconnect.org（wrangler 自动建 DNS + 证书）。
[[routes]]
pattern = "signal.veilconnect.org"
custom_domain = true

[durable_objects]
bindings = [
  { name = "SIGNALING_ROOM", class_name = "SignalingRoom" }
]

# 异步文件(网盘式)密文暂存：R2 桶 veilconnect-blob，Worker 内绑定名 BLOB。
# 只存密文+大小+过期(customMetadata.expiresAt)；过期对象 GET 时惰性删除，另配生命周期规则兜底硬删。
[[r2_buckets]]
binding = "BLOB"
bucket_name = "veilconnect-blob"

# SQLite-backed DO（new_sqlite_classes）以兼容 Cloudflare 免费套餐（本 DO 不落存储，仅用内存中继）。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom"]

[vars]
# 允许的网页来源（逗号分隔）：托管站点的 apex + www + Pages 别名。本地联调用 `wrangler dev --var` 覆盖。
ALLOWED_ORIGINS = "https://veilconnect.org,https://www.veilconnect.org,https://veilconnect.pages.dev"
TURN_TTL = "86400"
# 异步文件 blob：单文件上限(MB) + TTL(小时)。流式上传/下载,不再受 Worker 内存制约;
# 上限按 R2 单次 put 的合理范围取(GB 级)。如需更大可改 multipart。
BLOB_MAX_MB = "1024"
BLOB_TTL_H = "24"
# TURN_KEY_ID / TURN_API_TOKEN 用 `wrangler secret put` 设置，勿写入此文件。
