name: Release Desktop

# 推送 v* 标签即构建三平台桌面安装包并发到 GitHub Releases。
# 无签名证书时出【未签名】安装包（mac/win 会有系统安全提示）；
# 配好下方 Secret 后自动【签名+公证】。手动 workflow_dispatch 可只构建不发布（验证流水线）。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建/上传 Release

env:
  # 桌面版默认接入托管信令（与网页版同一网络，桌面↔网页可互通）。
  # 信令被视为不可信中继，不影响端到端加密；自部署者可改 localStorage 'vc.signalingUrl' 覆盖。
  VC_SIGNALING_URL: wss://signal.veilconnect.org
  VC_TURN_ENDPOINT: https://signal.veilconnect.org/turn-credentials

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 需要真实 electron 二进制来打包，故不跳过；--omit=optional 跳过仅测试用的重型可选依赖
      # (puppeteer/Chromium、node-datachannel 源码编译)。
      - name: Install dependencies
        run: npm ci --omit=optional

      # 桌面打包依赖隔离在 desktop-build/(独立 package-lock.json,全树锁定+integrity);
      # npm ci 逐包校验,堵住 electron-builder 传递依赖的供应链口子。不污染根/网页贡献者的安装。
      - name: Install desktop build deps (pinned lockfile)
        run: npm ci --prefix desktop-build

      # 渲染端(dist/renderer，信令已烘焙) + 主进程(dist/electron)
      - name: Build renderer + main process
        run: npm run build:electron

      - name: Package installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # —— 代码签名(配好对应仓库 Secret 即【自动】启用;缺省则该平台出未签名包)——
          # 按平台分开放证书,避免 mac/win 共用一个 CSC_LINK 互相串(见 docs/security/CODE_SIGNING.md):
          #   mac 签名:  MAC_CSC_LINK(.p12 的 base64) + MAC_CSC_KEY_PASSWORD
          #   mac 公证:  APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
          #   win 签名:  WIN_CSC_LINK(.pfx 的 base64) + WIN_CSC_KEY_PASSWORD
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          EXTRA=""
          case "${{ matrix.os }}" in
            macos-latest)
              # 把 mac 专用证书喂给 electron-builder 通用变量(仅本平台,不串到 win)。
              export CSC_LINK="${MAC_CSC_LINK:-}"; export CSC_KEY_PASSWORD="${MAC_CSC_KEY_PASSWORD:-}"
              if [ -z "$CSC_LINK" ]; then
                # 无 mac 证书:禁用自动发现 + identity=null 出 ad-hoc 未签名包(避免解析签名身份报「not a file」)。
                export CSC_IDENTITY_AUTO_DISCOVERY=false
                EXTRA="-c.mac.identity=null"
              elif [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
                EXTRA="-c.mac.notarize=true"   # 有证书 + Apple 凭据 → 签名后公证
              fi
              ;;
            windows-latest)
              export CSC_LINK="${WIN_CSC_LINK:-}"; export CSC_KEY_PASSWORD="${WIN_CSC_KEY_PASSWORD:-}"
              # 无 win 证书时 electron-builder 自动出未签名 exe,无需额外 flag。
              ;;
          esac
          # 用 desktop-build/ 里【锁定】的 electron-builder(cwd 仍是仓库根 → 打包根项目;
          # 二进制按自身位置解析依赖 → 走隔离的锁定树)。
          "$GITHUB_WORKSPACE/desktop-build/node_modules/.bin/electron-builder" --config electron-builder.yml --publish never $EXTRA

      - name: List artifacts
        shell: bash
        run: ls -la release || true

      # 为安装包生成 SHA-256 校验值(按平台分文件,避免矩阵间互相覆盖),供用户自验完整性。
      - name: Generate checksums
        shell: bash
        run: |
          cd release 2>/dev/null || { echo "no release dir"; exit 0; }
          shopt -s nullglob
          out="SHA256SUMS-${{ matrix.os }}.txt"
          : > "$out"
          # 逐文件加引号处理:electron-builder 的 NSIS 默认文件名含空格(如 "VeilConnect Setup 2.0.1.exe"),
          # 直接 `sha256sum $files` 会被按空格拆词导致 Windows 上失败。
          for f in *.dmg *.zip *.exe *.AppImage *.deb; do
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" >> "$out"; else shasum -a 256 "$f" >> "$out"; fi
          done
          cat "$out"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/SHA256SUMS-*.txt
          fail_on_unmatched_files: false
          body: |
            ## VeilConnect 桌面版 ${{ github.ref_name }}

            端到端加密聊天桌面客户端（OS 钥匙串保护私钥、只加载本地代码）。

            | 平台 | 文件 |
            |---|---|
            | macOS | `.dmg` / `.zip` |
            | Windows | `.exe`(安装程序) |
            | Linux | `.AppImage` / `.deb` |

            > ⚠️ 若为**未签名**版本：macOS 首次打开需右键「打开」并确认；Windows SmartScreen 需点「更多信息 → 仍要运行」。签名版发布后此提示消失。
            > 网页版直接用：https://veilconnect.org ｜ 自部署：见仓库 README。
