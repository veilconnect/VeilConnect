# VeilConnect 自部署一键栈：网页+信令(app) · TURN中继(coturn) · 自动HTTPS(caddy)
#
# 用法：
#   1. cp .env.example .env  并填好 DOMAIN / TURN_SECRET / EXTERNAL_IP
#   2. docker compose up -d --build
#   3. 浏览器访问 https://<DOMAIN>
#
# 端口：80/443(caddy, HTTP+HTTPS) · 3478(coturn, UDP/TCP) · 49160-49200(coturn relay, UDP)
# WebRTC/WebCrypto 需安全上下文(HTTPS)，故 caddy 负责为 DOMAIN 自动签发 Let's Encrypt 证书。

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3001"
      # 本栈中 app 固定跑在 Caddy 反代之后（单层），故按 X-Forwarded-For 倒数第 1 段识别真实客户端 IP，
      # 否则所有用户都呈现为 caddy 容器的同一 IP，按 IP 的连接/失败 join/TURN 限流会退化为全局阈值（易自我 DoS、防爆破失效）。
      TRUST_PROXY: "1"
      # 网页与信令同源 Origin 白名单。install.sh 会按端口写好 PUBLIC_ORIGIN；
      # 手动部署须在 .env 设 PUBLIC_ORIGIN=https://<域名或IP[:端口]>。
      ALLOWED_ORIGINS: "${PUBLIC_ORIGIN}"
      # /turn-credentials 用这些签发 coturn 时限凭据（须与 coturn 的 static-auth-secret/realm 一致）
      TURN_SECRET: "${TURN_SECRET}"
      TURN_HOST: "${DOMAIN}"
      TURN_PORT: "3478"
      TURN_TTL: "3600"
      # 中继传输：both(默认)|tcp|udp。wg/隧道环境设 tcp 更稳（避免 UDP MTU/分片导致 DTLS 握手失败）。
      TURN_TRANSPORT: "${TURN_TRANSPORT:-both}"
      # 信令详细日志默认关闭（隐私默认：不落 clientId/roomId/消息类型；明文 IP 不进入连接状态）。排障可设 1。
      SIGNAL_VERBOSE: "${SIGNAL_VERBOSE:-0}"
      # 将客户端 IP 转成不可逆限流指纹；由 install.sh 自动生成，勿公开。
      SIGNAL_IP_HASH_SECRET: "${SIGNAL_IP_HASH_SECRET}"
      # 持久化房间 token 摘要密钥；未设置时服务端复用 SIGNAL_IP_HASH_SECRET。
      ROOM_TOKEN_HASH_SECRET: "${ROOM_TOKEN_HASH_SECRET:-}"
      # 持久化房间注册表：只保存 roomId/token 摘要/容量，不保存聊天内容。
      PERSISTENT_ROOM_STORE: "${PERSISTENT_ROOM_STORE:-/data/persistent-rooms.json}"
      BLOB_DIR: "/data/blobs"
      # 读取 GET /metrics 的管理令牌；未设置时统计读取接口返回 404。
      METRICS_READ_TOKEN: "${METRICS_READ_TOKEN:-}"
    volumes:
      - app_data:/data
    expose:
      - "3001"

  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host    # coturn 处理 relay 需直接访问主机网络/端口
    # 注意：command 用 YAML 折叠标量(>)，块内 '#' 是字面文本而非注释，故说明只能写在块外。
    # --total-quota/--user-quota：/turn-credentials 无鉴权(同源 GET 不带 Origin 无法拦)，
    #   故在中继层封顶并发会话数，缓解脚本盗刷带宽；只限会话数不限 bps，不拖慢合法 relay 文件传输。
    # ${TURN_EXTRA_ARGS}：公网部署由 install.sh 填入 --no-loopback-peers + 私网段 denied-peer-ip
    #   (抗 SSRF，防 network_mode:host 下中继被当内网跳板)；local/LAN 留空，否则拒绝合法私网对端。
    command: >
      -n --no-cli --no-tls --no-dtls
      --listening-port=3478
      --realm=${DOMAIN}
      --server-name=${DOMAIN}
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --min-port=49160 --max-port=49200
      --listening-ip=${EXTERNAL_IP}
      --relay-ip=${EXTERNAL_IP}
      --external-ip=${EXTERNAL_IP}
      --no-multicast-peers
      --total-quota=${TURN_TOTAL_QUOTA:-1200}
      --user-quota=${TURN_USER_QUOTA:-12}
      ${TURN_EXTRA_ARGS:-}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      # 容器内外端口一致，使 Caddy 站点端口与浏览器访问端口匹配（local 自定义端口必需）。
      # 公网模式固定 80/443（Let's Encrypt ACME 要求）；local 自签模式可用 8080/8443 等。
      # BIND_IP 默认为 0.0.0.0；local/wg 部署可设为目标内网 IP，避免在所有网卡上监听。
      - "${BIND_IP:-0.0.0.0}:${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${BIND_IP:-0.0.0.0}:${HTTPS_PORT:-443}:${HTTPS_PORT:-443}"
    environment:
      DOMAIN: "${DOMAIN}"
      HTTP_PORT: "${HTTP_PORT:-80}"
      HTTPS_PORT: "${HTTPS_PORT:-443}"
    volumes:
      # 默认公网自动 HTTPS 的 Caddyfile；local 模式改挂 Caddyfile.local（自签 tls internal）
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  app_data:
  caddy_data:
  caddy_config:
